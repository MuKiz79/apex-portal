<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Karriaro Social Share Image mit neuem Logo -->

  <!-- Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F2E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#C9B99A" fill-opacity="0.03"/>
  <circle cx="100" cy="530" r="150" fill="#C9B99A" fill-opacity="0.03"/>

  <!-- Logo Icon -->
  <g transform="translate(80, 60) scale(1.8)">
    <!-- Linker Halbbogen -->
    <path d="M4 25 A21 21 0 0 1 25 4" stroke="#C9B99A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Rechter Halbbogen -->
    <path d="M46 25 A21 21 0 0 1 25 46" stroke="#C9B99A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Zentraler Aufwärtspfeil -->
    <path d="M25 42 L25 10" stroke="#C9B99A" stroke-width="3" stroke-linecap="round"/>
    <path d="M16 20 L25 8 L34 20" stroke="#C9B99A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Horizont-Linie -->
    <line x1="12" y1="25" x2="38" y2="25" stroke="#C9B99A" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- KARRIARO Text neben Icon -->
  <text x="185" y="118" font-family="Georgia, serif" font-size="38" font-weight="400" fill="#C9B99A" letter-spacing="6">KARRIARO</text>

  <!-- Main Headline -->
  <text x="100" y="280" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#FFFFFF">CV-Manufaktur &amp;</text>
  <text x="100" y="370" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#C9B99A">Executive Mentoring</text>

  <!-- Subheadline -->
  <text x="100" y="450" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF" fill-opacity="0.7">Professionelle Bewerbungsunterlagen und</text>
  <text x="100" y="490" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF" fill-opacity="0.7">Karriereberatung für Führungskräfte</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#C9B99A" fill-opacity="0.1"/>

  <!-- Website URL -->
  <text x="100" y="615" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#C9B99A">karriaro.de</text>

  <!-- Trust badges -->
  <text x="1100" y="615" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" fill-opacity="0.5" text-anchor="end">100% Diskret • Premium Service</text>

  <!-- Decorative corner elements -->
  <path d="M1150 50 L1150 100 L1100 100" stroke="#C9B99A" stroke-width="2" fill="none" stroke-opacity="0.3"/>
  <path d="M50 530 L50 580 L100 580" stroke="#C9B99A" stroke-width="2" fill="none" stroke-opacity="0.3"/>
</svg>
